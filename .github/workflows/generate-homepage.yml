name: Generate homepage

on:
  push:
    branches:
      - main
    paths:
      - "docs/topics/**"
      - "scripts/generate-homepage.ps1"
      - ".github/workflows/generate-homepage.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-homepage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate docs index
        shell: pwsh
        run: ./scripts/generate-homepage.ps1 -RepositoryRoot "${{ github.workspace }}"

      - name: Commit generated homepage
        shell: bash
        run: |
          if git diff --quiet -- docs/index.html; then
            echo "No homepage changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git commit -m "chore: regenerate homepage"
          git push
